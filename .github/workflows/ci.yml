name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run phantom
      - run: npm test
      - run: npm run build
      - name: Zero-network grep — dist must contain no external URLs
        run: |
          if grep -rEl 'https?://' dist/ --include='*.html' --include='*.js' --include='*.css' \
            | xargs -r grep -oE 'https?://[^"'"'"' )]*' \
            | grep -vE 'https?://(www\.w3\.org|registry|localhost)' ; then
            echo '::error::External URL found in dist/' && exit 1
          else
            echo 'dist/ is clean'
          fi
      - name: Nested-path serve smoke test
        run: |
          mkdir -p /tmp/nest/sub && cp -r dist /tmp/nest/sub/app
          (cd /tmp/nest && npx -y serve -l 8788 &) && sleep 2
          curl -sf http://localhost:8788/sub/app/index.html | grep -q '<div id="root">'
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
