name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run phantom
      - run: npm test
      - run: npm run build
      - name: No external resources in index.html
        # The real supply-chain surface: index.html must load no off-host
        # script/style/font. (Bundled JS chunks legitimately embed library
        # author/repo/license URL strings that are never fetched — the runtime
        # zero-network Playwright test below is the authoritative behavioral gate.)
        run: |
          if grep -oE '(src|href)="https?://[^"]*"' dist/index.html \
             | grep -vE '="https?://(localhost|127\.0\.0\.1)'; then
            echo '::error::index.html references an external resource' && exit 1
          else
            echo 'index.html loads only local assets'
          fi
      - name: Nested-path serve smoke test
        run: |
          mkdir -p /tmp/nest/sub && cp -r dist /tmp/nest/sub/app
          (cd /tmp/nest && npx -y serve -l 8788 &) && sleep 2
          curl -sf http://localhost:8788/sub/app/index.html | grep -q '<div id="root">'
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
